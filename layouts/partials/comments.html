{{- $cusdis := site.Params.cusdis -}}
{{- if $cusdis.appid -}}
<div class="comments">
  <h3>{{ i18n "comments_title" | default "Comments" }}</h3>
  <div id="cusdis_thread"
    data-host="{{ $cusdis.host | default "https://cusdis.com" }}"
    data-app-id="{{ $cusdis.appid }}"
    data-page-id="{{ .Permalink }}"
    data-page-url="{{ .Permalink }}"
    data-page-title="{{ .Title }}"
    data-theme="auto"
  ></div>
  <script async defer src="{{ $cusdis.host | default "https://cusdis.com" }}/js/cusdis.es.js"></script>
</div>
{{- end -}}
