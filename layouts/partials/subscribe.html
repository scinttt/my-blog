<div class="subscribe-section">
  <div class="subscribe-inner">
    <h3>{{ i18n "subscribe_title" | default "Stay Updated" }}</h3>
    <p class="subscribe-desc">{{ i18n "subscribe_desc" | default "Get new posts delivered to your inbox." }}</p>
    <form class="subscribe-form-wrapper" onsubmit="return handleSubscribe(this)">
      <div class="subscribe-form">
        <input type="email" name="email" placeholder="{{ i18n "subscribe_placeholder" | default "your@email.com" }}" required>
        <button type="submit">{{ i18n "subscribe_button" | default "Subscribe" }}</button>
      </div>
    </form>
    <p class="subscribe-msg" style="display:none;"></p>
  </div>
</div>
<script>
function handleSubscribe(form) {
  var email = form.querySelector('input[name="email"]').value;
  var btn = form.querySelector('button');
  var msg = form.closest('.subscribe-inner').querySelector('.subscribe-msg');
  var desc = form.closest('.subscribe-inner').querySelector('.subscribe-desc');
  btn.disabled = true;
  btn.textContent = '...';
  fetch('https://buttondown.com/api/emails/embed-subscribe/scinttt', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'email=' + encodeURIComponent(email) + '&embed=1',
    mode: 'no-cors'
  }).then(function() {
    form.style.display = 'none';
    desc.style.display = 'none';
    msg.style.display = '';
    msg.textContent = '{{ i18n "subscribe_success" | default "Thanks! Check your inbox to confirm." }}';
    msg.style.color = 'var(--primary)';
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = '{{ i18n "subscribe_button" | default "Subscribe" }}';
    msg.style.display = '';
    msg.textContent = '{{ i18n "subscribe_error" | default "Something went wrong. Please try again." }}';
    msg.style.color = '#e74c3c';
  });
  return false;
}
</script>
